<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文档预览工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap");
      :root {
        --bg: #0f0e0c;
        --surface: #1a1815;
        --surface2: #242220;
        --border: #333028;
        --accent: #c9a84c;
        --accent2: #e8c96a;
        --text: #e8e4dc;
        --muted: #8a8070;
        --paper: #faf8f4;
        --ink: #1a1612;
        --red: #e87060;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Noto Sans SC", sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }

      /* HEADER */
      header {
        height: 56px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
        font-family: "Noto Serif SC", serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .hdiv {
        width: 1px;
        height: 20px;
        background: var(--border);
      }
      .hsub {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .hright {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        border: none;
        font-weight: 500;
        transition: all 0.18s;
        white-space: nowrap;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--muted);
        background: var(--surface2);
      }
      .btn-primary {
        background: var(--accent);
        color: #1a1612;
      }
      .btn-primary:hover {
        background: var(--accent2);
        box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
      }

      /* APP */
      .app {
        flex: 1;
        display: flex;
        overflow: hidden;
        height: calc(100vh - 56px);
      }

      /* SIDEBAR */
      .sidebar {
        width: 256px;
        flex-shrink: 0;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border-right: 1px solid var(--border);
      }
      .sb-sec {
        padding: 10px 12px 6px;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }
      .file-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
      }
      .fi {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.14s;
        animation: slideIn 0.18s ease;
      }
      .fi:hover {
        background: var(--surface2);
      }
      .fi.active {
        background: rgba(201, 168, 76, 0.1);
        border-color: rgba(201, 168, 76, 0.3);
      }
      .fi.active .fname {
        color: var(--accent2);
      }
      .fbadge {
        flex-shrink: 0;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 2px 5px;
        border-radius: 3px;
        text-transform: uppercase;
      }
      .b-docx {
        background: rgba(100, 160, 255, 0.15);
        color: #80b0ff;
      }
      .b-pdf {
        background: rgba(255, 100, 80, 0.15);
        color: #ff8878;
      }
      .b-xlsx {
        background: rgba(100, 200, 120, 0.15);
        color: #70d090;
      }
      .fname {
        flex: 1;
        font-size: 12px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .frem {
        flex-shrink: 0;
        opacity: 0;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 2px 5px;
        border-radius: 3px;
        font-size: 14px;
        line-height: 1;
        transition: all 0.14s;
      }
      .fi:hover .frem {
        opacity: 1;
      }
      .frem:hover {
        color: var(--red);
        background: rgba(232, 112, 96, 0.1);
      }

      /* URL loader */
      .url-loader {
        margin: 8px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface2);
      }
      .url-lbl {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 7px;
      }
      .url-row {
        display: flex;
        gap: 5px;
      }
      .url-input {
        flex: 1;
        min-width: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 9px;
        font-size: 12px;
        color: var(--text);
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }
      .url-input::placeholder {
        color: var(--muted);
      }
      .url-input:focus {
        border-color: var(--accent);
      }
      .url-go {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        background: var(--accent);
        border: none;
        border-radius: 5px;
        color: #1a1612;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .url-go:hover {
        background: var(--accent2);
      }
      .url-go:active {
        transform: scale(0.94);
      }
      .url-go.busy {
        background: var(--border);
        pointer-events: none;
      }
      .url-err {
        font-size: 11px;
        color: var(--red);
        margin-top: 5px;
        word-break: break-all;
      }

      /* Drop zone */
      .drop-zone {
        margin: 8px;
        border: 1.5px dashed var(--border);
        border-radius: 8px;
        padding: 16px 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }
      .drop-zone:hover,
      .drop-zone.drag-over {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(201, 168, 76, 0.05);
      }

      /* MAIN */
      .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      /* Toolbar */
      .toolbar {
        flex-shrink: 0;
        display: none;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .tg {
        display: flex;
        align-items: center;
        gap: 3px;
        padding-right: 10px;
        border-right: 1px solid var(--border);
      }
      .tg:last-child {
        border-right: none;
        padding-right: 0;
      }
      .tbtn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 9px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        transition: all 0.14s;
        white-space: nowrap;
      }
      .tbtn:hover {
        background: var(--surface);
        color: var(--text);
        border-color: var(--border);
      }
      .tbtn:active {
        transform: scale(0.96);
      }
      .zoom-val {
        font-size: 12px;
        color: var(--muted);
        min-width: 38px;
        text-align: center;
      }
      .doc-info {
        font-size: 11px;
        color: var(--muted);
      }

      /* Sheet tabs */
      .sheet-tabs {
        display: none;
        align-items: center;
        gap: 2px;
        padding: 6px 18px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        flex-shrink: 0;
      }
      .stab {
        padding: 4px 14px;
        border-radius: 4px 4px 0 0;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        color: var(--muted);
        border: 1px solid transparent;
        transition: all 0.14s;
        background: transparent;
        font-family: inherit;
      }
      .stab:hover {
        color: var(--text);
        background: var(--surface2);
      }
      .stab.active {
        color: var(--accent2);
        background: rgba(201, 168, 76, 0.1);
        border-color: rgba(201, 168, 76, 0.3);
      }

      /* Search */
      .search-box {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 5px 9px;
      }
      .search-box input {
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 12px;
        font-family: inherit;
        width: 140px;
      }
      .search-box input::placeholder {
        color: var(--muted);
      }

      /* VIEWER */
      .viewer {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 36px 24px;
        background: #1c1a18;
        background-image: radial-gradient(
          ellipse at 50% 0%,
          rgba(201, 168, 76, 0.04) 0%,
          transparent 60%
        );
        position: relative;
      }

      /* Empty */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: var(--muted);
        pointer-events: none;
      }
      .empty-state svg {
        opacity: 0.2;
      }
      .empty-title {
        font-family: "Noto Serif SC", serif;
        font-size: 20px;
        color: var(--text);
        opacity: 0.35;
      }
      .empty-sub {
        font-size: 12px;
        opacity: 0.45;
      }
      .type-badges {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        opacity: 0.35;
      }
      .tbadge {
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 1px solid currentColor;
      }

      /* WORD */
      .page-wrapper {
        width: 100%;
        max-width: 880px;
        display: none;
        flex-direction: column;
        gap: 20px;
        animation: fadeUp 0.35s ease;
      }
      .page-wrapper.visible {
        display: flex;
      }
      .doc-page {
        background: var(--paper);
        color: var(--ink);
        box-shadow:
          0 4px 32px rgba(0, 0, 0, 0.6),
          0 1px 4px rgba(0, 0, 0, 0.4);
        border-radius: 3px;
        padding: 68px 84px;
        min-height: 1080px;
        width: 100%;
        transform-origin: top center;
        transition: transform 0.2s;
        position: relative;
      }
      .doc-page h1 {
        font-family: "Noto Serif SC", serif;
        font-size: 26px;
        font-weight: 700;
        margin: 28px 0 10px;
        border-bottom: 2px solid #c9a84c;
        padding-bottom: 7px;
        line-height: 1.4;
      }
      .doc-page h1:first-child {
        margin-top: 0;
      }
      .doc-page h2 {
        font-family: "Noto Serif SC", serif;
        font-size: 20px;
        font-weight: 600;
        margin: 22px 0 8px;
      }
      .doc-page h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 18px 0 6px;
      }
      .doc-page h4,
      .doc-page h5,
      .doc-page h6 {
        font-size: 14px;
        font-weight: 600;
        margin: 14px 0 5px;
      }
      .doc-page p {
        font-size: 14px;
        line-height: 1.85;
        margin-bottom: 12px;
        color: #2a2418;
        text-align: justify;
      }
      .doc-page ul,
      .doc-page ol {
        margin: 8px 0 12px 26px;
        line-height: 1.8;
      }
      .doc-page li {
        font-size: 14px;
        margin-bottom: 4px;
      }
      .doc-page table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0;
        font-size: 13px;
      }
      .doc-page table th {
        background: #f0ebe0;
        font-weight: 600;
        padding: 9px 13px;
        border: 1px solid #d8d0c0;
      }
      .doc-page table td {
        padding: 8px 13px;
        border: 1px solid #e0d8c8;
      }
      .doc-page table tr:nth-child(even) td {
        background: #f7f4ee;
      }
      .doc-page img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 14px auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      .doc-page a {
        color: #8b6914;
        text-decoration: underline;
      }
      .doc-page strong {
        font-weight: 700;
      }
      .doc-page blockquote {
        border-left: 3px solid #c9a84c;
        margin: 14px 0;
        padding: 7px 18px;
        background: #f5f0e4;
        font-style: italic;
      }
      .doc-page code {
        font-family: "Courier New", monospace;
        font-size: 12px;
        background: #f0ebe0;
        padding: 2px 5px;
        border-radius: 3px;
      }
      .doc-page pre {
        background: #f0ebe0;
        padding: 12px 16px;
        border-radius: 4px;
        overflow-x: auto;
        margin: 12px 0;
        border-left: 3px solid #c9a84c;
      }
      .page-num {
        position: absolute;
        bottom: 24px;
        right: 36px;
        font-size: 11px;
        color: #b0a890;
        font-family: "Noto Serif SC", serif;
      }

      /* PDF */
      .pdf-wrapper {
        width: 100%;
        max-width: 920px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: fadeUp 0.35s ease;
      }
      .pdf-wrapper.visible {
        display: flex;
      }
      .pdf-canvas {
        display: block;
        background: #fff;
        box-shadow: 0 4px 28px rgba(0, 0, 0, 0.6);
        border-radius: 2px;
        max-width: 100%;
        height: auto;
      }
      .pdf-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 10px;
        width: 100%;
      }
      .pdf-nav button {
        padding: 5px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        transition: all 0.14s;
      }
      .pdf-nav button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pdf-nav button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .pdf-pg {
        color: var(--muted);
        font-size: 12px;
      }

      /* EXCEL */
      .excel-wrapper {
        width: 100%;
        display: none;
        flex-direction: column;
        animation: fadeUp 0.35s ease;
      }
      .excel-wrapper.visible {
        display: flex;
      }
      .excel-scroll {
        overflow: auto;
        background: #fff;
        border-radius: 3px;
        box-shadow: 0 4px 28px rgba(0, 0, 0, 0.6);
        max-height: calc(100vh - 160px);
      }
      .xtable {
        border-collapse: collapse;
        font-size: 13px;
        white-space: nowrap;
        min-width: 100%;
      }
      .xtable th {
        background: #e8e4da;
        color: #2a2210;
        font-weight: 600;
        padding: 7px 12px;
        border: 1px solid #d0cabb;
        position: sticky;
        top: 0;
        z-index: 2;
        font-family: "Noto Sans SC", sans-serif;
        text-align: center;
        min-width: 80px;
      }
      .xtable .rn {
        background: #f0ece2;
        color: #8a8070;
        font-size: 11px;
        padding: 6px 10px;
        border: 1px solid #d8d4c8;
        text-align: center;
        position: sticky;
        left: 0;
        z-index: 1;
        min-width: 44px;
      }
      .xtable td {
        padding: 6px 12px;
        border: 1px solid #e4e0d4;
        color: #1a1612;
        max-width: 260px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .xtable tr:nth-child(even) td {
        background: #f7f5f0;
      }
      .xtable tr:nth-child(odd) td {
        background: #fff;
      }
      .xtable tr:hover td {
        background: #fdf5e0 !important;
      }
      .xtable td.num {
        text-align: right;
        color: #1a5a2a;
        font-family: monospace;
      }

      /* Misc */
      .err-msg {
        background: rgba(232, 112, 96, 0.1);
        border: 1px solid rgba(232, 112, 96, 0.3);
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 13px;
        color: var(--red);
        margin: 10px 0;
        display: none;
      }
      mark.hl {
        background: rgba(201, 168, 76, 0.5);
        color: inherit;
        border-radius: 2px;
      }

      /* Back to top */
      .b2t {
        position: absolute;
        bottom: 32px;
        right: 32px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.22s,
          transform 0.22s,
          background 0.14s,
          color 0.14s,
          box-shadow 0.14s;
        pointer-events: none;
        z-index: 50;
      }
      .b2t.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .b2t:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a1612;
        box-shadow: 0 4px 16px rgba(201, 168, 76, 0.35);
        transform: translateY(-2px);
      }

      /* Loading */
      .ov {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 14, 12, 0.75);
        backdrop-filter: blur(4px);
      }
      .ov.show {
        display: flex;
      }
      .ov-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 28px 36px;
        text-align: center;
        min-width: 220px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        margin: 0 auto 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .doc-page {
          padding: 40px 24px;
        }
      }
      @media print {
        header,
        .sidebar,
        .toolbar,
        .b2t,
        .sheet-tabs {
          display: none !important;
        }
        .app {
          height: auto;
        }
        .viewer {
          padding: 0;
          background: #fff;
          overflow: visible;
        }
        .doc-page {
          box-shadow: none;
          padding: 20mm 25mm;
          min-height: auto;
        }
        .pdf-canvas {
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6">
          <rect x="3" y="2" width="14" height="18" rx="2" />
          <path d="M7 7h6M7 11h6M7 15h4" stroke-linecap="round" />

          <svg

    </header>

    <div class="app">
      <!-- SIDEBAR -->

                d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path
                d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />

            链接加载
          </div>

        <div class="drop-zone" id="dropZone">
          <svg
            width="24"

            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            style="margin: 0 auto 6px; display: block; opacity: 0.5">
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="12" y1="18" x2="12" y2="12" />
            <line x1="9" y1="15" x2="15" y2="15" />

      <!-- MAIN -->
      <div class="main-panel">
        <div class="toolbar" id="toolbar">
          <div class="tg" id="zoomGroup">
            <button class="tbtn" onclick="zoom(-10)">
              <svg
                width="12"

                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <line x1="8" y1="11" x2="14" y2="11" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
            <span class="zoom-val" id="zoomVal">100%</span>
            <button class="tbtn" onclick="zoom(10)">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <line x1="11" y1="8" x2="11" y2="14" />
                <line x1="8" y1="11" x2="14" y2="11" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
            <button class="tbtn" onclick="resetZoom()">适合</button>
          </div>
          <div class="tg">
            <button
              class="tbtn"
              onclick="scrollToTop()"
              title="回到顶部 (Home)">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"

                stroke-linecap="round">

                <line x1="5" y1="19" x2="19" y2="19" />

            </button>

          <div class="tg"><span class="doc-info" id="docInfo"></span></div>
          <div class="search-box" id="searchBox">
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"

              type="text"
              id="searchInput"

              id="matchCount"

                font-size: 11px;
                color: var(--muted);

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="viewer" id="viewer">
          <!-- Empty -->

              <rect x="12" y="8" width="38" height="48" rx="3" />
              <path d="M22 22h20M22 30h20M22 38h12" stroke-linecap="round" />
              <circle cx="54" cy="54" r="12" />
              <path d="M50 54h8M54 50v8" stroke-linecap="round" />
            </svg>
            <div class="empty-title">暂无文档</div>
            <div class="empty-sub">上传文件或粘贴链接即可预览</div>
            <div class="type-badges">
              <span class="tbadge" style="color: #80b0ff">DOCX</span>
              <span class="tbadge" style="color: #ff8878">PDF</span>
              <span class="tbadge" style="color: #70d090">XLSX</span>
            </div>
          </div>

          <!-- Word -->
          <div class="page-wrapper" id="pageWrapper">
            <div class="doc-page" id="docContent"></div>
            <div class="err-msg" id="errMsg"></div>
          </div>

          <!-- PDF -->
          <div class="pdf-wrapper" id="pdfWrapper">
            <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
            <div class="pdf-nav">
              <button id="pdfPrev" onclick="pdfGo(-1)">← 上一页</button>
              <span class="pdf-pg" id="pdfPg"></span>
              <button id="pdfNext" onclick="pdfGo(1)">下一页 →</button>
            </div>

          <!-- Excel -->

        <!-- Back to top -->
        <button class="b2t" id="b2t" title="回到顶部" onclick="scrollToTop()">
          <svg
            width="15"
            height="15"

            fill="none"

            stroke-linejoin="round">

    <div class="ov" id="ov">
      <div class="ov-card">
        <div class="spinner"></div>
        <div style="font-size: 14px; color: var(--text)">正在解析文档</div>
        <div
          style="font-size: 12px; color: var(--muted); margin-top: 6px"
          id="ovSub"></div>
      </div>
    </div>

    <input
      type="file"
      id="fileInput"
      accept=".docx,.pdf,.xlsx,.xls"
      multiple
      style="display: none" />

    <script>
      // PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      // ── State ──
      const files = [];
      let curIdx = -1,
        zoomLv = 100,
        origHtml = "";
      let pdfDoc = null,
        pdfPage = 1,
        pdfBusy = false;
      let wb = null,
        sheets = [],
        curSheet = 0;

      // ── DOM ──
      const g = (id) => document.getElementById(id);
      const viewer = g("viewer"),
        fileList = g("fileList");
      const toolbar = g("toolbar"),
        zoomVal = g("zoomVal"),
        docInfo = g("docInfo");
      const pageWrapper = g("pageWrapper"),
        docContent = g("docContent");
      const pdfWrapper = g("pdfWrapper"),
        pdfCanvas = g("pdfCanvas");
      const excelWrapper = g("excelWrapper"),
        excelScroll = g("excelScroll");
      const sheetTabs = g("sheetTabs"),
        emptyState = g("emptyState");
      const searchBox = g("searchBox"),
        searchInput = g("searchInput"),
        matchCount = g("matchCount");
      const zoomGroup = g("zoomGroup"),
        printBtn = g("printBtn");
      const b2t = g("b2t"),
        ov = g("ov");

      // ── Type helpers ──
      const ext = (n) => (n.split(".").pop() || "").toLowerCase();
      function ftype(n) {
        const e = ext(n);
        if (e === "pdf") return "pdf";
        if (e === "xlsx" || e === "xls") return "excel";
        if (e === "docx") return "word";
        return "unknown";
      }

      function badgeHTML(name) {
        const t = ftype(name);
        const map = {
          word: ["DOCX", "b-docx"],
          pdf: ["PDF", "b-pdf"],
          excel: ["XLSX", "b-xlsx"],
        };
        const [lbl, cls] = map[t] || ["FILE", "b-docx"];
        return `<span class="fbadge ${cls}">${lbl}</span>`;
      }

      // ── File input / drop ──
      g("fileInput").addEventListener("change", (e) =>
        handleFiles(e.target.files),
      );
      g("dropZone").addEventListener("click", () => g("fileInput").click());

      ["dragenter", "dragover"].forEach((ev) => {
        g("dropZone").addEventListener(ev, (e) => {
          e.preventDefault();
          g("dropZone").classList.add("drag-over");
        });
        document.addEventListener(ev, (e) => e.preventDefault());
      });
      ["dragleave", "dragend"].forEach((ev) =>
        g("dropZone").addEventListener(ev, () =>
          g("dropZone").classList.remove("drag-over"),
        ),
      );
      g("dropZone").addEventListener("drop", (e) => {
        e.preventDefault();
        g("dropZone").classList.remove("drag-over");
        handleFiles(e.dataTransfer.files);
      });
      document.addEventListener("drop", (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
      });

      function handleFiles(list) {
        const ok = Array.from(list).filter((f) =>
          /\.(docx|pdf|xlsx|xls)$/i.test(f.name),
        );
        if (!ok.length) return flash("支持 .docx / .pdf / .xlsx 文件");
        ok.forEach((f) => {
          if (files.find((x) => x.name === f.name && !x._url)) return;
          files.push(f);
          addItem(f, files.length - 1);
        });
        loadFile(files.length - 1);
      }

      function addItem(file, idx) {
        const el = document.createElement("div");
        el.className = "fi";
        el.dataset.idx = idx;
        el.innerHTML = `${badgeHTML(file._url || file.name)}<span class="fname" title="${file.name}">${file.name}</span><button class="frem" onclick="removeFile(event,${idx})">×</button>`;
        el.addEventListener("click", () => loadFile(idx));
        fileList.appendChild(el);
      }

      function removeFile(e, idx) {
        e.stopPropagation();
        files.splice(idx, 1);
        fileList.innerHTML = "";
        files.forEach((f, i) => addItem(f, i));
        files.length ? loadFile(Math.min(idx, files.length - 1)) : showEmpty();
      }

      function setActive(idx) {
        document
          .querySelectorAll(".fi")
          .forEach((el, i) => el.classList.toggle("active", i === idx));
      }

      // ── Load dispatcher ──
      async function loadFile(idx) {
        if (idx < 0 || idx >= files.length) return;
        curIdx = idx;
        setActive(idx);
        const f = files[idx],
          t = ftype(f._url || f.name);
        showOv(`正在解析 "${f.name}"…`);
        hideAll();
        try {
          const ab = f._ab
            ? f._ab
            : f._url
              ? await fetchURL(f._url)
              : await f.arrayBuffer();
          if (t === "word") await renderWord(ab, f);
          else if (t === "pdf") await renderPDF(ab, f);
          else if (t === "excel") await renderExcel(ab, f);
          else flash("不支持的文件格式");
        } catch (err) {
          flash("解析失败：" + (err.message || "未知错误"));
          console.error(err);
        } finally {
          hideOv();
        }
      }

      async function fetchURL(url) {
        try {
          const r = await fetch(url);
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.arrayBuffer();
        } catch {
          const r2 = await fetch(
            "https://corsproxy.io/?" + encodeURIComponent(url),
          );
          if (!r2.ok) throw new Error("HTTP " + r2.status);
          return r2.arrayBuffer();
        }
      }

      // ══ WORD ══
      async function renderWord(ab, file) {
        const res = await mammoth.convertToHtml(
          { arrayBuffer: ab },
          {
            convertImage: mammoth.images.imgElement((img) =>
              img
                .read("base64")
                .then((d) => ({ src: `data:${img.contentType};base64,${d}` })),
            ),
          },
        );
        origHtml = res.value;
        docContent.innerHTML = origHtml;
        const old = docContent.querySelector(".page-num");
        if (old) old.remove();
        const pn = document.createElement("span");
        pn.className = "page-num";
        pn.textContent = "1";
        docContent.appendChild(pn);
        pageWrapper.classList.add("visible");
        toolbar.style.display = "flex";
        searchBox.style.display = "flex";
        zoomGroup.style.display = "flex";
        printBtn.style.display = "";
        applyZoom();
        const warn = res.messages.filter((m) => m.type === "warning").length;
        const wc = docContent.innerText.trim().split(/\s+/).length;
        docInfo.textContent = `${fmtSz(file.size || ab.byteLength)} · 约 ${wc.toLocaleString()} 字${warn ? " · " + warn + " 警告" : ""}`;
        if (searchInput.value) searchDoc(searchInput.value);
        scrollToTop();
      }

      // ══ PDF ══
      async function renderPDF(ab, file) {
        pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(ab) })
          .promise;
        pdfPage = 1;
        pdfWrapper.classList.add("visible");
        toolbar.style.display = "flex";
        searchBox.style.display = "none";
        zoomGroup.style.display = "flex";
        printBtn.style.display = "";
        docInfo.textContent = `${fmtSz(file.size || ab.byteLength)} · ${pdfDoc.numPages} 页`;
        await drawPDFPage(pdfPage);
        scrollToTop();
      }

      async function drawPDFPage(num) {
        if (!pdfDoc || pdfBusy) return;
        pdfBusy = true;
        try {
          const page = await pdfDoc.getPage(num);
          const vw = viewer.clientWidth - 80;
          const baseVP = page.getViewport({ scale: 1 });
          const scale = (zoomLv / 100) * (vw / baseVP.width);
          const vp = page.getViewport({ scale });
          pdfCanvas.width = vp.width;
          pdfCanvas.height = vp.height;
          await page.render({
            canvasContext: pdfCanvas.getContext("2d"),
            viewport: vp,
          }).promise;
        } finally {
          pdfBusy = false;
        }
        g("pdfPg").textContent = `第 ${num} / ${pdfDoc.numPages} 页`;
        g("pdfPrev").disabled = num <= 1;
        g("pdfNext").disabled = num >= pdfDoc.numPages;
      }

      function pdfGo(d) {
        const np = pdfPage + d;
        if (np >= 1 && np <= pdfDoc?.numPages) {
          pdfPage = np;
          drawPDFPage(pdfPage);
        }
      }

      // ══ EXCEL ══
      async function renderExcel(ab, file) {
        wb = XLSX.read(new Uint8Array(ab), { type: "array" });
        sheets = wb.SheetNames;
        curSheet = 0;
        sheetTabs.innerHTML = "";
        sheets.forEach((name, i) => {
          const btn = document.createElement("button");
          btn.className = "stab" + (i === 0 ? " active" : "");
          btn.textContent = name;
          btn.onclick = () => switchSheet(i);
          sheetTabs.appendChild(btn);
        });
        excelWrapper.classList.add("visible");
        toolbar.style.display = "flex";
        sheetTabs.style.display = "flex";
        searchBox.style.display = "none";
        zoomGroup.style.display = "none";
        printBtn.style.display = "";
        docInfo.textContent = `${fmtSz(file.size || ab.byteLength)} · ${sheets.length} 个工作表`;
        drawSheet(0);
        scrollToTop();
      }

      function switchSheet(idx) {
        curSheet = idx;
        document
          .querySelectorAll(".stab")
          .forEach((t, i) => t.classList.toggle("active", i === idx));
        drawSheet(idx);
      }

      function drawSheet(idx) {
        const ws = wb.Sheets[sheets[idx]];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        if (!data.length) {
          excelScroll.innerHTML =
            '<div style="padding:24px;color:var(--muted);font-size:13px">工作表为空</div>';
          return;
        }
        const cols = Math.max(...data.map((r) => r.length));
        let html =
          '<table class="xtable"><thead><tr><th style="min-width:44px">#</th>';
        for (let c = 0; c < cols; c++) html += `<th>${colLetter(c)}</th>`;
        html += "</tr></thead><tbody>";
        data.forEach((row, ri) => {
          html += `<tr><td class="rn">${ri + 1}</td>`;
          for (let c = 0; c < cols; c++) {
            const v = row[c] ?? "";
            const isN = v !== "" && !isNaN(Number(v));
            html += `<td class="${v === "" ? "" : ""}${isN ? " num" : ""}" title="${esc(String(v))}">${esc(String(v))}</td>`;
          }
          html += "</tr>";
        });
        html += "</tbody></table>";
        excelScroll.innerHTML = html;
      }

      function colLetter(n) {
        let s = "";
        n++;
        while (n > 0) {
          n--;
          s = String.fromCharCode(65 + (n % 26)) + s;
          n = Math.floor(n / 26);
        }
        return s;
      }
      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ══ URL loader ══
      async function loadFromUrl() {
        const inp = g("urlInput"),
          err = g("urlErr"),
          go = g("urlGo");
        const url = inp.value.trim();
        err.textContent = "";
        if (!url) {
          err.textContent = "请输入文件链接";
          return;
        }
        try {
          new URL(url);
        } catch {
          err.textContent = "链接格式不正确";
          return;
        }
        go.classList.add("busy");
        go.innerHTML =
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6-8.5" stroke-linecap="round"/></svg>';
        showOv("正在下载文件…");
        try {
          const ab = await fetchURL(url);
          const urlObj = new URL(url);
          let fname =
            decodeURIComponent(urlObj.pathname.split("/").pop()) ||
            "document.docx";
          if (ftype(fname) === "unknown") fname += ".docx";
          const fake = { name: fname, size: ab.byteLength, _url: url, _ab: ab };
          const ei = files.findIndex((f) => f._url === url);
          if (ei === -1) {
            files.push(fake);
            addItem(fake, files.length - 1);
            curIdx = files.length - 1;
          } else {
            files[ei] = fake;
            curIdx = ei;
          }
          setActive(curIdx);
          hideAll();
          const t = ftype(fname);
          if (t === "word") await renderWord(ab, fake);
          else if (t === "pdf") await renderPDF(ab, fake);
          else if (t === "excel") await renderExcel(ab, fake);
          else flash("无法识别文件类型");
          inp.value = "";
        } catch (e) {
          flash("加载失败：" + (e.message || "网络错误"));
          err.textContent = "加载失败：" + (e.message || "网络错误");
          console.error(e);
        } finally {
          hideOv();
          go.classList.remove("busy");
          go.innerHTML =
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
        }
      }

      // ══ Search ══
      function searchDoc(q) {
        docContent.innerHTML = origHtml;
        if (!q.trim()) {
          matchCount.style.display = "none";
          return;
        }
        const re = new RegExp(
          "(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")",
          "gi",
        );
        docContent.innerHTML = docContent.innerHTML.replace(
          /(<[^>]+>)|([^<]+)/g,
          (_, tag, txt) =>
            tag ? tag : txt.replace(re, '<mark class="hl">$1</mark>'),
        );
        const hits = docContent.querySelectorAll("mark.hl").length;
        matchCount.style.display = "";
        matchCount.textContent = hits ? hits + " 处" : "无匹配";
        if (hits)
          docContent
            .querySelector("mark.hl")
            .scrollIntoView({ behavior: "smooth", block: "center" });
      }

      // ══ Zoom ══
      function zoom(d) {
        zoomLv = Math.min(200, Math.max(40, zoomLv + d));
        applyZoom();
      }
      function resetZoom() {
        zoomLv = 100;
        applyZoom();
      }
      function applyZoom() {
        zoomVal.textContent = zoomLv + "%";
        const t =
          curIdx >= 0 ? ftype(files[curIdx]._url || files[curIdx].name) : "";
        if (t === "word") {
          docContent.parentElement.style.transform = `scale(${zoomLv / 100})`;
          docContent.parentElement.style.marginBottom =
            zoomLv > 100 ? `${(zoomLv - 100) * 8}px` : "0";
        }
        if (t === "pdf" && pdfDoc) drawPDFPage(pdfPage);
      }

      // ══ UI helpers ══
      function hideAll() {
        pageWrapper.classList.remove("visible");
        pdfWrapper.classList.remove("visible");
        excelWrapper.classList.remove("visible");
        emptyState.style.display = "none";
        sheetTabs.style.display = "none";
        toolbar.style.display = "none";
        printBtn.style.display = "none";
        searchInput.value = "";
        matchCount.style.display = "none";
        g("errMsg").style.display = "none";
        pdfDoc = null;
        wb = null;
      }
      function showEmpty() {
        hideAll();
        emptyState.style.display = "";
        curIdx = -1;
      }
      function flash(msg) {
        const el = g("errMsg");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 6000);
      }
      function showOv(msg) {
        g("ovSub").textContent = msg;
        ov.classList.add("show");
      }
      function hideOv() {
        ov.classList.remove("show");
      }
      function fmtSz(b) {
        return b < 1048576
          ? (b / 1024).toFixed(1) + " KB"
          : (b / 1048576).toFixed(2) + " MB";
      }

      // ══ Scroll ══
      function scrollToTop() {
        viewer.scrollTo({ top: 0, behavior: "smooth" });
      }
      viewer.addEventListener("scroll", () =>
        b2t.classList.toggle("show", viewer.scrollTop > 300),
      );

      // ══ Keys ══
      document.addEventListener("keydown", (e) => {
        const inI = ["INPUT", "TEXTAREA"].includes(
          document.activeElement.tagName,
        );
        if ((e.ctrlKey || e.metaKey) && e.key === "f") {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "=") {
          e.preventDefault();
          zoom(10);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "-") {
          e.preventDefault();
          zoom(-10);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "0") {
          e.preventDefault();
          resetZoom();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "o") {
          e.preventDefault();
          g("fileInput").click();
        }
        if (e.key === "Home" && !inI) {
          e.preventDefault();
          scrollToTop();
        }
        if (e.key === "ArrowLeft" && pdfDoc && !inI) pdfGo(-1);
        if (e.key === "ArrowRight" && pdfDoc && !inI) pdfGo(1);
      });

      // init
      showEmpty();
    </script>
  </body>
</html>
